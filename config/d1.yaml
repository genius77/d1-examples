# ============================================================
# D1 底座主配置文件
# ============================================================

# 应用实例名称（用于区分不同 D1 实例）
# 支持预定义变量：
#   {hostname}   - 机器主机名
#   {pid}        - 进程 ID
#   {random}     - 随机字符串（默认 8 位，格式 {random:N} 指定位数）
#   {timestamp}  - 启动时间戳（毫秒）
# 示例:
#   name: "myd1-{hostname}-{pid}"
#   name: "myd1-pod-abc123"    # 固定值（容器/K8s 环境推荐）
name: "d1-{hostname}-{pid}"

# ============================================================
# 日志配置（缺省值见下，不需要的字段可删除）
# ============================================================
log:
  path: "./logs/d1.log"   # 日志文件路径（可含目录和文件名），缺省= d1.yaml 同级目录下的 d1.log
  level: "info"           # debug / info / warn / error / fatal / off，缺省 "info"
  max_size: 5             # 单文件最大 MB，缺省 5
  max_backups: 10         # 保留文件数，0=不限制（与 max_age 同时设时取交集），缺省 10
  max_age: 0              # 保留天数，0=不限制，缺省 0
  compress: false         # 归档 gzip 压缩，缺省 false
  stdout: false           # 同时输出到控制台，缺省 false
  format: "console"       # json / console，缺省 "console"

# ============================================================
# 调度器配置
# ============================================================
# 调度器负责管理消息队列和 Worker 池，控制并发和处理流程。
# 任务超时应由业务层（脚本/服务）自行实现，调度器不负责强制终止。
# ============================================================

scheduler:
  # ----------------------------------------------------------
  # enabled: 是否启用调度器
  # ----------------------------------------------------------
  # 说明: 控制是否启用调度器（队列 + Worker 池）。
  #       false = 不启用，任务直接在接收 goroutine 中执行（交给 Go runtime 调度）
  #       true  = 启用，任务进入队列，由 Worker 池调度执行
  # 类型: bool
  # 默认值: false
  #
  # 建议:
  #   - 简单场景 / 边缘设备: false（更简单、更低开销）
  #   - 高并发 / 需要控制并发: true（配合 worker_pool_size 使用）
  enabled: false

  # ----------------------------------------------------------
  # worker_pool_size: Worker 并发数
  # ----------------------------------------------------------
  # 说明: 固定大小的 Worker 池，控制同时执行的任务数量。
  # 类型: int
  # 默认值: 100
  # 最小值: 1（必须 >= 1）
  # 
  # 建议值:
  #   - 边缘设备 (1-2核):   10-50
  #   - 标准服务器 (4-8核): 100-200
  #   - 高并发场景 (16核+): 200-500
  # 
  # 注意:
  #   - 调大 → 更多 CPU 占用，更高并发
  #   - 调小 → 更少 CPU 占用，并发能力下降
  #   - worker_pool_size < 1 是无效配置，将拒绝启动
  worker_pool_size: 100

  # ----------------------------------------------------------
  # queue_size: 消息队列缓冲大小
  # ----------------------------------------------------------
  # 说明: 当所有 Worker 繁忙时，新消息进入此队列排队。
  # 类型: int
  # 默认值: 0
  # 最小值: 0
  # 
  # 0: 无缓冲队列
  #   - 消息必须立即被 Worker 接收，否则发送方阻塞
  #   - 内存占用最低，实时性最高
  #   - 发送方阻塞会形成背压，传导到上游
  #   - 适用于边缘设备、内存敏感、实时性要求高的场景
  #
  # >0: 有缓冲队列
  #   - 消息先入队，Worker 慢慢消费
  #   - 允许短暂积压，削峰填谷
  #   - 计算公式: 预期峰值 QPS × 平均处理时间(秒) × 安全系数(2-5)
  #     例如: QPS=500, 处理时间=0.1s → 500×0.1×4 = 2000
  #   - 队列越大，内存占用越高
  #   - 适用于服务器、允许短暂积压的场景
  # 
  # 注意: queue_size < 0 是无效配置，将拒绝启动
  queue_size: 0

  # ----------------------------------------------------------
  # block_on_full: 队列满时的行为
  # ----------------------------------------------------------
  # 说明: 仅当 queue_size > 0 时有效。
  # 类型: bool
  # 默认值: false
  # 
  # false: 快速失败（推荐）
  #   - 调用方立即收到错误，自行决定重试或降级
  #   - 适用于大多数场景
  #
  # true: 阻塞等待（不推荐）
  #   - 调用方阻塞，直到队列有空间
  #   - 可能导致调用方长时间阻塞
  #   - 仅适用于绝对不能丢失消息的场景
  # 
  # 注意: 当 queue_size = 0 时，此配置无效
  block_on_full: false

# ============================================================
# 存储配置（可选，不配置则无缓存/数据库）
# ============================================================

# 缓存配置（可选）
# 驱动: bigcache / valkey
cache:
  driver: "bigcache"              # bigcache / valkey，缺省 "bigcache"
  default_ttl: 300                # 默认过期时间（秒），缺省 300
  dsn: "bigcache://?max_entries=100000&max_size_mb=256&wal_path=./data/cache/wal"

  # ----- Valkey/Redis 示例 -----
  # driver: "valkey"
  # default_ttl: 300
  # dsn: "valkey://?address=localhost:6379&password=&db=0"

# 数据库配置（可选）
# 驱动: sqlite / postgres / oracle
database:
  driver: "sqlite"                # sqlite / postgres / oracle，缺省 "sqlite"
  dsn: "file:./data/d1.db?cache=shared&_journal_mode=WAL"
  max_open_conns: 1               # 最大连接数，缺省值取决于驱动（sqlite=1, pg=20, oracle=10）
  max_idle_conns: 1               # 最大空闲连接，缺省值取决于驱动

  # ----- PostgreSQL 示例 -----
  # driver: "postgres"
  # dsn: "host=localhost port=5432 user=d1 password=d1 dbname=d1 sslmode=disable"

  # ----- Oracle 示例 -----
  # driver: "oracle"
  # dsn: "oracle://user:password@localhost:1521/XEPDB1"

# ============================================================
# 子配置文件路径（相对于本文件所在目录）
# ============================================================
# 连接管理器配置
connector: "connector.yaml"

# 路由配置
router: "router.yaml"

# ============================================================
# 子配置项（可选）
# ============================================================
# 字符串值 = 文件路径（相对于本文件所在目录）
# 对象/map 值 = 内联配置
# ============================================================
default_timeout: 180      # 扩展调用默认超时时间（秒），缺省 180
script: "script.yaml"   # 脚本配置（可选）
exec: "exec.yaml"       # 执行任务配置（可选）
service: "service.yaml" # 微服务配置（可选）
